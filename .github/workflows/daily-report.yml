name: Daily Attendance Report

on:
  schedule:
    # 11:00 UTC ≈ 6:00/7:00 AM US Eastern depending on DST. Adjust to taste —
    # GitHub Actions cron runs in UTC. Scheduled workflows are auto-disabled
    # after 60 days of repo inactivity; re-enable under Actions if that happens.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

jobs:
  send-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node send-daily-report.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIRECTOR_EMAIL: ${{ secrets.DIRECTOR_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          REPORT_TIMEZONE: "America/New_York"
