<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance Scan-In</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="kiosk-wrap">
    <img class="logo" src="assets/logo.png" alt="Florida Conquer Volleyball Club" />
    <h1>Florida Conquer — Attendance Scan-In</h1>
    <div class="clock" id="clock"></div>

    <div id="autoModeStatus" style="margin-bottom:1rem;">
      <div style="color:var(--silver); font-size:0.95rem;">Practice is detected automatically from the master schedule.</div>
      <button id="manualToggleBtn" class="secondary" style="margin-top:0.5rem; font-size:0.8rem; padding:0.4rem 0.9rem;">Switch to manual picker</button>
    </div>

    <div id="manualPickerWrap" class="hidden" style="width: 100%;">
      <label style="text-align:center;">Which practice is happening right now?</label>
      <div id="sessionPicker" class="session-picker"></div>
      <button id="backToAutoBtn" class="secondary" style="font-size:0.8rem; padding:0.4rem 0.9rem; margin-bottom:1.5rem;">Back to automatic</button>
    </div>

    <input
      id="scanInput"
      type="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      placeholder="Scan your badge here"
    />

    <div id="flash" class="idle">Ready — scan a badge to check in.</div>

    <p style="margin-top:3rem;"><a href="admin.html" style="color:#9aa5b1; font-size:0.85rem;">Director admin console</a></p>
  </div>

  <script type="module" src="assets/kiosk.js"></script>
</body>
</html>
